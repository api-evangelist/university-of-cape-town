  - date: '2026-06-03'
    rating: 2
    summary: >-
      UCT has no single consolidated developer portal, but three real public
      machine-readable interfaces were verified live: the DataFirst NADA
      microdata catalog REST API returned valid JSON listing 573 surveys; the
      OpenUCT DSpace institutional repository served a valid OAI-PMH 2.0 Identify
      response (base URL https://open.uct.ac.za/server/oai/request); and the
      ZivaHub open data repository is built on Figshare for Institutions and is
      reachable through the public Figshare API. Most operational/SIS/identity
      systems are gated. No endpoints were fabricated; every URL below was
      probed during the review.
    endpoints:
